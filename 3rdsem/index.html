<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WBCHSE QUESTION BANK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2ede1;
    --paper: #fffdf7;
    --ink: #201d2e;
    --primary: #26305c;
    --primary-dark: #171d3d;
    --primary-light: #4a578f;
    --accent: #b8432f;
    --gold: #cf9a41;
    --muted: #837d6c;
    --border: #e4dcc6;
    --correct: #1c8a4f;
    --correct-bg: #e6f6ec;
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: 'Inter', 'Segoe UI', Roboto, Arial, sans-serif;
    background:
      radial-gradient(circle at 10% 0%, rgba(38,48,92,0.05), transparent 40%),
      var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Header : exam-paper masthead ===== */
  header {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.07), rgba(0,0,0,0.08)),
      linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fdfcf8;
    padding: 22px 18px 18px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 6px 18px rgba(23,29,61,0.25);
    border-bottom: 3px solid var(--gold);
  }
  header h1 {
    margin: 0;
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 19px;
    letter-spacing: 0.2px;
  }
  header .subtitle {
    margin-top: 4px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.68;
    font-weight: 600;
  }
  .breadcrumb {
    margin-top: 12px;
    font-size: 12.5px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 4px;
  }
  .breadcrumb span.crumb {
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    transition: background 0.15s ease;
    white-space: nowrap;
  }
  .breadcrumb span.crumb:hover { background: rgba(255,255,255,0.2); }
  .breadcrumb span.crumb.current {
    background: var(--gold);
    color: var(--primary-dark);
    font-weight: 700;
    border-color: var(--gold);
    cursor: default;
  }
  .breadcrumb .sep { opacity: 0.45; font-size: 11px; }

  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 22px 16px 70px;
  }

  /* ===== Card grid (subjects / topics) ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    animation: fadeUp 0.35s ease both;
  }
  .card-btn {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 14px 18px;
    text-align: center;
    cursor: pointer;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15.5px;
    font-weight: 600;
    color: var(--ink);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    box-shadow: 0 2px 6px rgba(35,32,50,0.06);
    -webkit-user-select: none;
    user-select: none;
  }
  .card-btn::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 12px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--bg);
    box-shadow: inset 0 0 0 1px var(--border);
  }
  .card-btn:hover {
    border-color: var(--gold);
    transform: translateY(-3px) rotate(-0.4deg);
    box-shadow: 0 10px 22px rgba(184,67,47,0.14);
  }
  .card-btn:active { transform: translateY(-1px) scale(0.98); }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 18px;
    background: var(--paper);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--primary-dark);
    min-height: 44px;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .back-btn:hover { background: #fff; border-color: var(--gold); }
  .back-btn:active { transform: scale(0.97); }

  .loader {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 14.5px;
  }
  .loader::before {
    content: '';
    display: block;
    width: 30px;
    height: 30px;
    margin: 0 auto 14px;
    border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .error-box {
    background: #fbe6e2;
    color: var(--accent);
    padding: 16px;
    border-radius: 12px;
    font-size: 14px;
    border: 1px solid #f0c4ba;
  }

  /* ===== Question card : ruled notebook paper ===== */
  .q-card {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 18px 18px 26px;
    margin-bottom: 18px;
    box-shadow: 0 3px 10px rgba(35,32,50,0.06);
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }
  .q-card::before {
    content: '';
    position: absolute;
    left: 14px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: rgba(184,67,47,0.35);
  }
  .q-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .q-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 30px;
    height: 30px;
    padding: 0 8px;
    border-radius: 999px;
    background: var(--primary);
    color: #fff;
    font-weight: 700;
    font-size: 13.5px;
    font-family: 'JetBrains Mono', monospace;
  }
  .q-topic-tag {
    font-size: 11.5px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 4px 9px;
    border-radius: 999px;
    max-width: 60%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .q-text {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    line-height: 1.55;
    color: var(--ink);
  }
  .q-image {
    max-width: 100%;
    border-radius: 10px;
    margin-bottom: 14px;
    display: block;
    border: 1px solid var(--border);
  }
  .opts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }
  .opt {
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    line-height: 1.4;
    transition: background 0.15s ease;
  }
  .opt.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #124a2c;
    font-weight: 600;
  }
  .opt-label {
    flex: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    border: 1.5px solid var(--border);
    font-weight: 700;
    font-size: 12px;
    color: var(--primary);
  }
  .opt.correct .opt-label {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }
  .opt.correct .stamp {
    position: absolute;
    top: -8px;
    right: -6px;
    background: var(--correct);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    transform: rotate(6deg);
    box-shadow: 0 2px 5px rgba(28,138,79,0.4);
    letter-spacing: 0.3px;
  }
  .location {
    margin-top: 12px;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
  }

  @media (max-width: 480px) {
    header h1 { font-size: 16.5px; }
    .opts { grid-template-columns: 1fr; }
    .q-card { padding: 18px 14px 16px 22px; }
    .card-btn { padding: 20px 10px 16px; font-size: 14.5px; }
    main { padding: 16px 12px 60px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>

<header>
  <h1>📚 WBCHSE Higher Secondary | প্রশ্ন ব্যাংক</h1>
  <div class="subtitle">3rd SEM Question Bank Viewer</div>
  <div class="breadcrumb" id="breadcrumb"><span class="crumb current">Subjects</span></div>
</header>

<main id="app">
  <div class="loader">লোড হচ্ছে...</div>
</main>

<script>
/* ============================================================
   *** এখানে তোমার Apps Script Web App URL বসাও ***
   (Deploy > New deployment > Web app করার পর যে URL পাবে সেটা এখানে বসাও)
   ============================================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbzcFfinvdiabXCEh7x15jJuE5PKveqQgb9nfT2stHbDcCDrV06tzWqY29cfb7Fa9aq0/exec";

const app = document.getElementById('app');
const breadcrumb = document.getElementById('breadcrumb');

let state = {
  screen: 'Subjects', // sheets | topics | questions
  sheet: null,
  topic: null
};

function setLoading() {
  app.innerHTML = '<div class="loader">লোড হচ্ছে...</div>';
}

function setError(msg) {
  app.innerHTML = '<div class="error-box">⚠️ ' + msg + '</div>';
}

function updateBreadcrumb() {
  const isSubjectsCurrent = !state.sheet;
  let html = `<span class="crumb${isSubjectsCurrent ? ' current' : ''}" onclick="goToSheets()">Subjects</span>`;
  if (state.sheet) {
    const isSheetCurrent = !state.topic;
    html += '<span class="sep">&raquo;</span>';
    html += `<span class="crumb${isSheetCurrent ? ' current' : ''}" onclick="goToTopics()">${escapeHTML(state.sheet)}</span>`;
  }
  if (state.topic) {
    html += '<span class="sep">&raquo;</span>';
    html += `<span class="crumb current">${escapeHTML(state.topic)}</span>`;
  }
  breadcrumb.innerHTML = html;
}

async function fetchJSON(params) {
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  if (!res.ok) throw new Error('Server error: ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadSheets() {
  state = { screen: 'sheets', sheet: null, topic: null };
  updateBreadcrumb();
  setLoading();
  try {
    const data = await fetchJSON({ action: 'getSheets' });
    renderSheets(data.sheets);
  } catch (err) {
    setError(err.message);
  }
}

function renderSheets(sheets) {
  if (!sheets || sheets.length === 0) {
    app.innerHTML = '<div class="error-box">কোনো Subject পাওয়া যায়নি।</div>';
    return;
  }
  let html = '<div class="grid">';
  sheets.forEach(s => {
    html += `<div class="card-btn" onclick="selectSheet('${escapeQuotes(s)}')">${escapeHTML(s)}</div>`;
  });
  html += '</div>';
  app.innerHTML = html;
}

async function selectSheet(sheetName) {
  state.sheet = sheetName;
  state.screen = 'topics';
  state.topic = null;
  updateBreadcrumb();
  setLoading();
  try {
    const data = await fetchJSON({ action: 'getTopics', sheet: sheetName });
    renderTopics(data.topics);
  } catch (err) {
    setError(err.message);
  }
}

function renderTopics(topics) {
  let html = '<button class="back-btn" onclick="goToSheets()">&larr; Subjects এ ফিরে যাও</button>';
  if (!topics || topics.length === 0) {
    html += '<div class="error-box">এই Subject-এ কোনো Topic পাওয়া যায়নি।</div>';
    app.innerHTML = html;
    return;
  }
  html += '<div class="grid">';
  topics.forEach(t => {
    html += `<div class="card-btn" onclick="selectTopic('${escapeQuotes(t)}')">${escapeHTML(t)}</div>`;
  });
  html += '</div>';
  app.innerHTML = html;
}

async function selectTopic(topicName) {
  state.topic = topicName;
  state.screen = 'questions';
  updateBreadcrumb();
  setLoading();
  try {
    const data = await fetchJSON({ action: 'getQuestions', sheet: state.sheet, topic: topicName });
    renderQuestions(data.questions);
  } catch (err) {
    setError(err.message);
  }
}

function renderQuestions(questions) {
  let html = '<button class="back-btn" onclick="goToTopics()">&larr; Topics এ ফিরে যাও</button>';
  if (!questions || questions.length === 0) {
    html += '<div class="error-box">এই Topic-এ কোনো Question পাওয়া যায়নি।</div>';
    app.innerHTML = html;
    return;
  }

  questions.forEach((q, idx) => {
    html += '<div class="q-card">';
    html += `<div class="q-top"><span class="q-num">Q${idx + 1}</span><span class="q-topic-tag">${escapeHTML(q.topic)}</span></div>`;
    html += `<div class="q-text">${escapeHTML(q.question)}</div>`;
    if (q.image && String(q.image).trim() !== '') {
      html += `<img class="q-image" src="${escapeHTML(q.image)}" alt="question image" onerror="this.style.display='none'">`;
    }
    html += '<div class="opts">';
    const opts = { A: q.a, B: q.b, C: q.c, D: q.d };
    for (const label in opts) {
      const isCorrect = String(q.rightOption).trim().toUpperCase() === label;
      html += `<div class="opt ${isCorrect ? 'correct' : ''}">`;
      if (isCorrect) html += '<span class="stamp">✓ সঠিক</span>';
      html += `<span class="opt-label">${label}</span><span>${escapeHTML(opts[label])}</span>`;
      html += '</div>';
    }
    html += '</div>';
    html += `<div class="location">SL: ${escapeHTML(q.sl)}</div>`;
    html += '</div>';
  });

  app.innerHTML = html;
}

function goToSheets() { loadSheets(); }
function goToTopics() { selectSheet(state.sheet); }

function escapeHTML(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
function escapeQuotes(str) {
  return String(str).replace(/'/g, "\\'");
}

// initial load
loadSheets();
</script>

</body>
</html>
